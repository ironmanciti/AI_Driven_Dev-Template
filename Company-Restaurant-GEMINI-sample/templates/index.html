<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 식당 메뉴 추천</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-logo">Restaurant AI</div>
        <ul class="nav-list">
            <li class="nav-item active" onclick="switchView('today')">오늘의 메뉴</li>
            <li class="nav-item" onclick="switchView('weekly')">주간 식단표</li>
            <li class="nav-item" onclick="switchView('mypage')">마이페이지</li>
            <li class="nav-item" onclick="switchView('admin')">통계 및 관리</li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="content">
        <!-- View 1: Today's Menu -->
        <div id="view-today" class="view-container active">
            <header>
                <h1>오늘의 점심 추천</h1>
            </header>
            <section class="login-section">
                <input type="text" id="emp-num" placeholder="사번을 입력하세요 (예: EMP001)">
                <button onclick="login()">확인</button>
                <div id="employee-info" class="employee-info"></div>
            </section>
            <section id="menu-section">
                <div id="menu-grid" class="menu-grid"></div>
            </section>
        </div>

        <!-- View 2: Weekly Menu -->
        <div id="view-weekly" class="view-container">
            <header>
                <h1>주간 식단표</h1>
            </header>
            <section class="weekly-grid" id="weekly-grid">
                <!-- 날짜별 섹션이 여기에 동적으로 추가됩니다 -->
            </section>
        </div>

        <!-- View 3: My Page -->
        <div id="view-mypage" class="view-container">
            <header>
                <h1>마이페이지</h1>
            </header>
            <div id="mypage-content">
                <p style="color: var(--text-secondary); margin-bottom: 24px;">로그인 후 이용 가능합니다.</p>
                <div id="selection-history"></div>
            </div>
        </div>

        <!-- View 4: Admin/Stats -->
        <div id="view-admin" class="view-container">
            <header>
                <h1>통계 및 관리</h1>
            </header>
            <section id="admin-content">
                <h2 style="font-size: 18px; margin-bottom: 16px;">메뉴별 선택 현황</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>메뉴명</th>
                            <th>선택 횟수</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body"></tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
